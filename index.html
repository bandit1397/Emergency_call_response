<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>경찰 상황실 – 응급환자 수용 현황</title>

<style>
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:#0f172a;color:#e5e7eb}
header{background:#020617;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem;margin:0}
main{padding:16px}
.card{background:#020617;border-radius:10px;padding:14px;margin-bottom:12px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.field{flex:1 1 200px}
label{font-size:.8rem;color:#94a3b8}
input{width:100%;padding:8px;border-radius:6px;border:1px solid #334155;background:#020617;color:#e5e7eb}
button{padding:10px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem}
.btn-primary{background:#2563eb;color:white}
.btn-danger{background:#b91c1c;color:white}
.hosp{display:flex;justify-content:space-between;align-items:center;padding:10px;border-bottom:1px solid #1e293b}
.status-ok{color:#22c55e;font-weight:700}
.status-wait{color:#facc15}
.log{background:#020617;border-radius:8px;padding:10px;font-family:monospace;font-size:.8rem;max-height:240px;overflow:auto}
.small{font-size:.75rem;color:#94a3b8}
</style>
</head>

<body>
<header>
  <h1>🚓 경찰 상황실 – 응급환자 수용 현황</h1>
  <div id="clock"></div>
</header>

<main>

<div class="card">
  <div class="row">
    <div class="field">
      <label>요청 ID</label>
      <input id="reqId" placeholder="REQ-자동생성">
    </div>
    <div class="field">
      <label>환자 요약</label>
      <input id="summary" placeholder="예: 60대 남성, 의식저하">
    </div>
    <div class="field">
      <label>ETA</label>
      <input id="eta" placeholder="예: 5분">
    </div>
  </div>

  <div class="row" style="margin-top:10px">
    <div class="field" style="flex:2">
      <label>병원 목록 (쉼표 구분)</label>
      <input id="hospInput" placeholder="A병원,B병원,C센터">
    </div>
    <div class="field" style="flex:1;align-self:flex-end">
      <button class="btn-primary" onclick="createRequest()">요청 발송</button>
    </div>
  </div>
  <div class="small" style="margin-top:6px">※ 요청 발송 시 Make Webhook으로 전송됩니다.</div>
</div>

<div class="card">
  <h3>병원 응답 현황</h3>
  <div id="hospList"></div>
  <div style="margin-top:10px;display:flex;gap:8px">
    <button class="btn-primary" onclick="finalize()">최종 선정</button>
    <button class="btn-danger" onclick="endRequest()">요청 종료</button>
  </div>
</div>

<div class="card">
  <h3>상황 로그</h3>
  <div class="log" id="log"></div>
</div>

</main>

<script>
/************** 설정값 **************/
// 1) 요청 발송 Webhook (Make: Custom webhook)
const MAKE_WEBHOOK_REQUEST = "https://hook.eu1.make.com/ ";
 

// 2) 최종 선정 Webhook (Make: Custom webhook)
const MAKE_WEBHOOK_FINAL   = "https://hook.eu1.make.com/REPLACE_FINAL";

// 3) Google Sheets 공개 JSON (opensheet)
const SHEET_API_URL = "https://opensheet.elk.sh/REPLACE_SHEET_ID/REPLACE_SHEET_NAME";

/************** 상태 **************/
const state = { requestID:'', summary:'', eta:'', hospitals:[] };
const logEl = document.getElementById('log');
const clockEl = document.getElementById('clock');

/************** 유틸 **************/
function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.innerText = `[${t}] ${msg}\n` + logEl.innerText;
}

function render(){
  const el = document.getElementById('hospList');
  el.innerHTML = '';
  state.hospitals.forEach(h=>{
    const d = document.createElement('div');
    d.className = 'hosp';
    const cls = h.response ? 'status-ok' : 'status-wait';
    d.innerHTML = `<div>${h.name}</div><div class="${cls}">${h.response || '대기중'}</div>`;
    el.appendChild(d);
  });
}

/************** 요청 발송 **************/
async function createRequest(){
  state.requestID = document.getElementById('reqId').value || `REQ-${Date.now()}`;
  state.summary   = document.getElementById('summary').value || '';
  state.eta       = document.getElementById('eta').value || '';
  state.hospitals = document.getElementById('hospInput').value
    .split(',').map(h=>({name:h.trim(),response:null}))
    .filter(h=>h.name);

  render();

  try {
    await fetch(MAKE_WEBHOOK_REQUEST,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        requestID: state.requestID,
        summary: state.summary,
        eta: state.eta,
        hospitals: state.hospitals.map(h=>h.name)
      })
    });
    log(`요청 발송 완료 (${state.requestID})`);
  } catch(e){
    log('요청 발송 실패');
  }
}

/************** 병원 응답 자동 수신 **************/
async function fetchResponses(){
  if(!state.requestID) return;
  try{
    const res = await fetch(SHEET_API_URL);
    const data = await res.json();
    data.filter(r=>r.requestID===state.requestID)
        .forEach(r=>{
          const h = state.hospitals.find(x=>x.name===r.hospital);
          if(h && !h.response){
            h.response = r.response;
            log(`${r.hospital} 응답 수신 → ${r.response}`);
          }
        });
    render();
  }catch(e){
    log('응답 조회 실패');
  }
}

/************** 최종 선정 **************/
async function finalize(){
  const ok = state.hospitals.find(h=>h.response==='가능');
  if(!ok){ alert('가능 병원 없음'); return; }

  if(!confirm(`${ok.name} 최종 선정 (전화 컨펌 완료)?`)) return;

  try {
    await fetch(MAKE_WEBHOOK_FINAL,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({requestID: state.requestID, finalHospital: ok.name})
    });
    log(`🚑 최종 선정 병원: ${ok.name}`);
  } catch(e){
    log('최종 선정 Webhook 실패');
  }
}

/************** 종료 **************/
function endRequest(){
  log('요청 종료');
}

/************** 시계 & 폴링 **************/
setInterval(()=>{
  clockEl.innerText = new Date().toLocaleString();
},1000);

setInterval(fetchResponses,30000);
</script>
</body>
</html>
