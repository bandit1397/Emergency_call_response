<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>병원 응급수용 알림판</title>
<style>
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR",Arial;background:#0f172a;color:#e5e7eb;display:flex;justify-content:center;align-items:center;min-height:100vh}
.wrap{width:min(900px,95vw)}
.card{background:#020617;border-radius:18px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
h1{margin:0 0 8px;font-size:2rem}.sub{color:#94a3b8;margin-bottom:20px}
.req{display:none;background:#111827;border:1px solid #334155;border-radius:16px;padding:24px;margin-top:16px}
.req.active{display:block;animation:fade .3s ease}
.row{margin:10px 0;font-size:1.15rem}.label{color:#94a3b8}
.btns{display:flex;gap:16px;margin-top:24px}
button{flex:1;padding:18px;border:none;border-radius:14px;font-size:1.2rem;font-weight:700;cursor:pointer}
.ok{background:#16a34a;color:#fff}.no{background:#dc2626;color:#fff}
.status{margin-top:16px;color:#facc15}.idle{padding:40px;text-align:center;color:#94a3b8;font-size:1.2rem}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>🏥 응급환자 수용 문의 알림판</h1>
    <div class="sub">병원 PC에서 항상 켜두세요. 새 요청이 오면 자동 팝업됩니다.</div>
    <div id="idle" class="idle">현재 대기 중입니다.</div>
    <div id="reqBox" class="req">
      <div class="row"><span class="label">요청 ID:</span> <span id="reqId"></span></div>
      <div class="row"><span class="label">환자 상태:</span> <span id="summary"></span></div>
      <div class="row"><span class="label">도착 예상:</span> <span id="eta"></span></div>
      <div class="btns">
        <button class="ok" onclick="sendResponse('가능')">수용 가능</button>
        <button class="no" onclick="sendResponse('불가')">수용 불가</button>
      </div>
      <div id="status" class="status"></div>
    </div>
  </div>
</div>
<audio id="alarm" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg" type="audio/ogg">
</audio>
<script>
const HOSPITAL_NAME = new URLSearchParams(location.search).get('hospital') || 'A병원';
const SHEET_API_URL = 'https://opensheet.elk.sh/1EEsd2nzWRlD9F41ipwn9fTYEsqJJlTgNZy3PDAxtKno/시트1';
const RESPONSE_WEBHOOK = 'https://hook.eu1.make.com/yrvh6doutwop0gdo73uq1lpfbvx8s851';
let currentReq = null;
let answered = new Set(JSON.parse(localStorage.getItem('answeredReqs')||'[]'));

async function checkRequests(){
  try{
    const res = await fetch(SHEET_API_URL);
    const data = await res.json();
    const pending = data.reverse().find(r => r.hospital === HOSPITAL_NAME && r.requestID && !answered.has(r.requestID));
    if(pending && (!currentReq || currentReq.requestID !== pending.requestID)){
      showPopup(pending);
    }
  }catch(e){console.error(e)}
}

function showPopup(req){
  currentReq = req;
  document.getElementById('idle').style.display='none';
  document.getElementById('reqBox').classList.add('active');
  document.getElementById('reqId').innerText = req.requestID;
  document.getElementById('summary').innerText = req.summary || '-';
  document.getElementById('eta').innerText = req.eta || '-';
  document.getElementById('status').innerText = '새 요청이 도착했습니다.';
  document.getElementById('alarm').play().catch(()=>{});
  alert('응급환자 수용 문의가 도착했습니다.');
}

async function sendResponse(response){
  if(!currentReq) return;
  const url = `${RESPONSE_WEBHOOK}?requestID=${encodeURIComponent(currentReq.requestID)}&hospital=${encodeURIComponent(HOSPITAL_NAME)}&response=${encodeURIComponent(response)}`;
  try{
    const res = await fetch(url);
    if(!res.ok) throw new Error();
    answered.add(currentReq.requestID);
    localStorage.setItem('answeredReqs', JSON.stringify([...answered]));
    document.getElementById('status').innerText = `응답 완료: ${response}`;
    setTimeout(()=>{
      document.getElementById('reqBox').classList.remove('active');
      document.getElementById('idle').style.display='block';
      currentReq = null;
    },1500);
  }catch(e){
    document.getElementById('status').innerText = '응답 전송 실패';
  }
}

checkRequests();
setInterval(checkRequests, 5000);
</script>
</body>
</html>
